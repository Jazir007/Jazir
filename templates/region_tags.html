{% extends 'base.html' %}{% block heading %}Region tags{% endblock %}{% block content %}<section class="panel"><h2>Region settings</h2><form method="post" class="form-grid"><label class="check"><input type="checkbox" name="regions_enabled" {% if setting and setting.regions_enabled %}checked{% endif %}>Enable region tag for transactions</label><label>Add region<input name="name" placeholder="e.g. Dubai"></label><button class="primary">Save region settings</button></form></section><section class="panel"><h2>Active regions</h2><table><thead><tr><th>Region</th></tr></thead><tbody>{% for region in regions %}<tr><td>{{ region.name }}</td></tr>{% else %}<tr><td class="empty">No regions added.</td></tr>{% endfor %}</tbody></table></section>{% endblock %}
