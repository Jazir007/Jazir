{% extends 'base.html' %}{% block heading %}Edit analysis tag{% endblock %}{% block content %}<section class="panel"><form method="post" class="form-grid"><label>Analysis category<select name="analysis_category_id">{% for category in categories %}<option value="{{ category.id }}" {% if category.id == tag.analysis_category_id %}selected{% endif %}>{{ category.name }}</option>{% endfor %}</select></label><label>Tag name<input name="name" value="{{ tag.name }}" required></label><div class="actions"><a class="secondary" href="{{ url_for('accounting_tags') }}">Cancel</a><button class="primary">Save changes</button></div></form><form method="post" action="{{ url_for('delete_analysis_tag', tag_id=tag.id) }}" class="actions" onsubmit="return confirm('Delete this Analysis Tag?')"><span class="hint">This removes the tag from future transaction selection.</span><button class="danger">Delete tag</button></form></section>{% endblock %}
