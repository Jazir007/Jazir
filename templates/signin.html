<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Sign in · Zedjer</title><link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"><link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}"></head>
<body class="auth-page"><main class="auth-shell"><section class="auth-card"><a class="auth-brand" href="{{ url_for('dashboard') }}"><span>◉</span> Zedjer</a><p class="eyebrow">YOUR ACCOUNTING WORKSPACE</p><h1>Welcome back</h1><p class="auth-copy">Sign in to open your companies and accounting records.</p>{% with messages=get_flashed_messages(with_categories=true) %}{% for type,message in messages %}<div class="flash {{ type }}">{{ message }}</div>{% endfor %}{% endwith %}<form method="post" class="auth-form" autocomplete="on"><label>Email address<input name="email" type="email" required autofocus autocomplete="email" placeholder="you@example.com"></label><label>Password<input name="password" type="password" required autocomplete="current-password" placeholder="Your password"></label><button class="primary" type="submit">Sign in</button></form><p class="auth-switch">New to Zedjer? <a href="{{ url_for('sign_up') }}">Create an account</a></p></section></main></body></html>
