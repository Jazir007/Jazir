<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Create account · Zedjer</title><link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"><link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}"></head><body class="auth-page"><main class="auth-shell"><section class="auth-card"><a class="auth-brand" href="{{ url_for('dashboard') }}">Zedjer</a><p class="eyebrow">GET STARTED</p><h1>Create your account</h1><p class="auth-copy">A few details help the ERP administrator understand who is using Zedjer.</p>{% with messages=get_flashed_messages(with_categories=true) %}{% for type,message in messages %}<div class="flash {{ type }}">{{ message }}</div>{% endfor %}{% endwith %}<form method="post" class="auth-form" autocomplete="on"><label>Your name<input name="display_name" required autofocus autocomplete="name" placeholder="Your name"></label><label>Email address<input name="email" type="email" required autocomplete="email" placeholder="you@example.com"></label><label>Profession<input name="profession" required placeholder="e.g. Accountant, business owner"></label><label>Field / industry<input name="industry" required placeholder="e.g. Trading, construction"></label><label>How did you hear about Zedjer?<input name="discovery_source" required placeholder="e.g. Friend, Google, social media"></label><label>Password<input name="password" type="password" required minlength="8" autocomplete="new-password" placeholder="At least 8 characters"></label><label>Confirm password<input name="confirm_password" type="password" required minlength="8" autocomplete="new-password" placeholder="Re-enter password"></label><button class="primary" type="submit">Create account</button></form><p class="auth-switch">Already have an account? <a href="{{ url_for('sign_in') }}">Sign in</a></p></section></main></body></html>
