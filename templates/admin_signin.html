<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Administrator sign in · Zedjer</title><link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"><link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}"></head><body class="auth-page"><main class="auth-shell"><section class="auth-card"><a class="auth-brand" href="{{ url_for('dashboard') }}">Zedjer</a><p class="eyebrow">OWNER ACCESS</p><h1>Administrator sign in</h1><p class="auth-copy">Use the first Zedjer owner account to manage registered users.</p>{% with messages=get_flashed_messages(with_categories=true) %}{% for type,message in messages %}<div class="flash {{ type }}">{{ message }}</div>{% endfor %}{% endwith %}<form method="post" class="auth-form"><label>Administrator email<input name="email" type="email" required autofocus autocomplete="email"></label><label>Password<input name="password" type="password" required autocomplete="current-password"></label><button class="primary">Open Administrator Desk</button></form><p class="auth-switch"><a href="{{ url_for('sign_in') }}">Return to user sign in</a></p></section></main></body></html>
