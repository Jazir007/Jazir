{% extends 'base.html' %}{% block heading %}Edit company{% endblock %}{% block content %}<section class="panel"><p><a class="secondary" href="{{ url_for('master') }}">Back to Master settings</a></p><form method="post" class="form-grid company-form"><label>Company name<input name="name" value="{{ company.name }}" required></label><label>Legal name<input name="legal_name" value="{{ company.legal_name or '' }}"></label><label>Tax / VAT number<input name="tax_number" value="{{ company.tax_number or '' }}"></label><label class="wide-field">Address<textarea name="address" rows="2">{{ company.address or '' }}</textarea></label><label>Mobile<input name="mobile" value="{{ company.mobile or '' }}"></label><label>Email<input name="email" value="{{ company.email or '' }}"></label><label>Base currency<input name="base_currency" value="{{ company.base_currency }}" maxlength="3" required></label><label>Financial year starts<input type="date" name="financial_year_start" value="{{ company.financial_year_start }}" required></label><label>Financial year ends<input type="date" name="financial_year_end" value="{{ company.financial_year_end }}" required></label><label>4-digit transaction edit PIN<input name="edit_pin" inputmode="numeric" pattern="[0-9]{4}" maxlength="4" placeholder="Set or replace PIN"></label><div class="actions"><a class="secondary" href="{{ url_for('companies_dashboard') }}">Cancel</a><button class="primary">Save changes</button></div></form></section>{% endblock %}
