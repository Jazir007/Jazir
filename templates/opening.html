<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Zedjer Books</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    .opening-screen{position:relative;min-height:100vh;display:grid;place-items:center;margin:0;overflow:hidden;background:radial-gradient(circle at 50% 38%,#168a9a 0,transparent 28%),linear-gradient(145deg,#063d5b,#086d83 52%,#0d8593)!important;transition:opacity .22s ease-out,transform .22s cubic-bezier(.22,.8,.25,1)}
    .opening-screen.is-leaving{opacity:0;transform:scale(1.022)}
    .opening-intro{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;padding:32px;text-align:center;color:#fff}
    .opening-logo{width:min(275px,68vw);filter:brightness(0) invert(1) drop-shadow(0 17px 22px rgba(0,20,40,.28));opacity:0;transform:scale(.7) rotate(-5deg);animation:openLogo 1.45s cubic-bezier(.22,.8,.26,1) .1s forwards,logoGlow 5.5s ease-in-out 1.55s infinite}
    .opening-name{display:flex;align-items:center;gap:8px;margin-top:28px;font-family:Arial Black,Arial,sans-serif;font-size:clamp(32px,6vw,50px);font-weight:950;letter-spacing:-.08em;opacity:0;transform:translateY(18px);animation:openItem .75s cubic-bezier(.22,.8,.26,1) 1.12s forwards}
    .opening-name b{font-weight:950;animation:nameBreathe 4s ease-in-out 1.7s infinite}.opening-name span{display:grid;place-items:center;padding:5px 11px 6px;border:2px solid rgba(255,255,255,.84);border-radius:10px;color:#efffff;font-family:Arial,sans-serif;font-size:.54em;font-weight:700;letter-spacing:.18em;animation:booksFloat 3.5s ease-in-out 1.8s infinite}
    .opening-tagline{max-width:420px;margin:17px 0 0;color:#d8fffb;text-transform:uppercase;letter-spacing:.18em;font-weight:800;font-size:12px;line-height:1.55;opacity:0;transform:translateY(14px);animation:openItem .7s cubic-bezier(.22,.8,.26,1) 1.63s forwards}
    .enter-zedjer{position:relative;isolation:isolate;overflow:hidden;margin-top:34px;padding:14px 31px;border:1px solid rgba(255,255,255,.74);border-radius:999px;background:linear-gradient(125deg,rgba(9,86,121,.68),rgba(32,158,166,.38) 52%,rgba(5,74,111,.7));box-shadow:inset 0 1px 1px rgba(255,255,255,.45),inset 0 -1px 5px rgba(0,33,66,.22),0 12px 28px rgba(0,24,49,.24),0 0 0 0 rgba(201,255,250,.45);backdrop-filter:blur(14px) saturate(1.25);-webkit-backdrop-filter:blur(14px) saturate(1.25);color:#fff;font:650 15px -apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;letter-spacing:.01em;text-decoration:none;opacity:0;transform:translateY(12px) scale(.97);animation:openEnter .65s cubic-bezier(.22,.8,.26,1) 2.3s forwards,enterPulse 3.8s ease-in-out 3.2s infinite;transition:transform .25s ease,box-shadow .25s ease}
    .enter-zedjer:before{content:"";position:absolute;z-index:-1;inset:-55%;border-radius:48%;background:radial-gradient(ellipse at 30% 34%,rgba(218,255,255,.38),transparent 27%),radial-gradient(ellipse at 72% 70%,rgba(42,213,211,.34),transparent 30%);animation:liquidFlow 6s ease-in-out infinite}.enter-zedjer:after{content:"";position:absolute;inset:50%;z-index:-1;width:12px;height:12px;border:1px solid rgba(225,255,255,.9);border-radius:50%;opacity:0;transform:translate(-50%,-50%) scale(.2);pointer-events:none}.enter-zedjer.is-flowing:before{animation:liquidClick .34s cubic-bezier(.16,.8,.22,1) both}.enter-zedjer.is-flowing:after{animation:liquidRipple .42s ease-out both}
    .enter-zedjer:hover{transform:translateY(-3px) scale(1.025);box-shadow:0 15px 28px rgba(0,20,45,.38)}.enter-zedjer:active{transform:scale(.97)}
    @keyframes openLogo{60%{opacity:1;transform:scale(1.045) rotate(1deg)}100%{opacity:1;transform:none}}@keyframes logoGlow{50%{filter:brightness(0) invert(1) drop-shadow(0 20px 31px rgba(136,255,245,.42))}}@keyframes nameBreathe{50%{text-shadow:0 0 20px rgba(203,255,249,.32);letter-spacing:-.055em}}@keyframes booksFloat{50%{transform:translateY(-2px);box-shadow:0 5px 13px rgba(202,255,249,.15)}}
    @keyframes openItem{to{opacity:1;transform:none}}@keyframes openEnter{to{opacity:1;transform:none}}
    @keyframes enterPulse{50%{box-shadow:inset 0 1px 1px rgba(255,255,255,.5),inset 0 -1px 5px rgba(0,33,66,.22),0 14px 30px rgba(0,24,49,.31),0 0 0 9px rgba(151,255,245,0)}}@keyframes liquidFlow{0%,100%{transform:translate3d(-6%,-4%,0) rotate(0deg)}50%{transform:translate3d(8%,6%,0) rotate(12deg)}}@keyframes liquidClick{to{transform:translate3d(11%,9%,0) rotate(22deg) scale(1.18)}}@keyframes liquidRipple{0%{opacity:.9;transform:translate(-50%,-50%) scale(.2)}100%{opacity:0;transform:translate(-50%,-50%) scale(18)}}
    @media(prefers-reduced-motion:reduce){.opening-screen,.opening-logo,.opening-name,.opening-name b,.opening-name span,.opening-tagline,.enter-zedjer,.enter-zedjer:before,.enter-zedjer:after{opacity:1;transform:none;animation:none;transition:none}}
  </style>
</head>
<body class="opening-screen">
  <main class="opening-intro">
    <img class="opening-logo" src="{{ url_for('static', filename='zedjer-books-logo.png') }}" alt="Zedjer Books logo">
    <div class="opening-name"><b>ZEDJER</b><span>BOOKS</span></div>
    <p class="opening-tagline">Your Personal Finances, Perfectly Aligned</p>
    <a class="enter-zedjer" href="{{ url_for('sign_in') }}" onclick="event.preventDefault();this.classList.add('is-flowing');document.body.classList.add('is-leaving');setTimeout(()=>location.href=this.href,220)">Enter Zedjer Books</a>
  </main>
</body>
</html>
