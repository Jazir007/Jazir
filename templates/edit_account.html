{% extends 'base.html' %}{% block heading %}Edit account{% endblock %}{% block content %}<section class="panel"><form method="post" class="form-grid account-opening-form"><label>Code<input name="code" value="{{ account.code }}" required></label><label>Name<input name="name" value="{{ account.name }}" required></label><label>Main group<select name="category">{% for kind in ['Asset','Liability','Equity','Income','Expense'] %}<option {% if account.category == kind %}selected{% endif %}>{{ kind }}</option>{% endfor %}</select></label><label>Subgroup<select name="subgroup_id"><option value="">No subgroup</option>{% for subgroup in subgroups %}<option value="{{ subgroup.id }}" {% if account.subgroup_id == subgroup.id %}selected{% endif %}>{{ subgroup.category }} - {{ subgroup.name }}</option>{% endfor %}</select></label><label>Default currency<input name="default_currency" value="{{ account.default_currency or active_company.base_currency }}" required></label><label>Rate to INR<input name="exchange_rate" type="number" step="0.000001" min="0.000001" value="{{ opening.fx_rate if opening else 1 }}" required></label><label>Opening date<input type="date" name="opening_date" value="{{ opening.effective_date if opening else active_company.financial_year_start }}"></label><label>Opening debit<input name="opening_debit" type="number" step="0.01" min="0" value="{{ opening.debit if opening else '' }}"></label><label>Opening credit<input name="opening_credit" type="number" step="0.01" min="0" value="{{ opening.credit if opening else '' }}"></label><label class="check"><input type="checkbox" name="is_cash" {% if account.is_cash %}checked{% endif %}>Cash / bank / card ledger</label><label>Cash type<select name="cash_type"><option value="Bank" {% if account.cash_type == 'Bank' %}selected{% endif %}>Bank</option><option value="Cash" {% if account.cash_type == 'Cash' %}selected{% endif %}>Cash</option><option value="Card" {% if account.cash_type == 'Card' %}selected{% endif %}>Card</option></select></label><div class="actions"><a class="secondary" href="{{ url_for('accounts') }}">Cancel</a><button class="primary">Save account</button></div></form></section>{% endblock %}
