{% extends 'base.html' %}{% block heading %}Edit transaction{% endblock %}{% block content %}<section class="panel"><p class="hint">Every edited transaction must remain balanced. Your company PIN is requested only when saving.</p><form method="post" class="transaction-edit-form"><input type="hidden" name="edit_pin" value=""><div class="form-grid"><label>Document type<select name="document_type">{% for document_type in document_types %}<option value="{{ document_type }}" {% if entry.document_type == document_type %}selected{% endif %}>{{ document_type }}</option>{% endfor %}</select></label><label>Document no.<input name="document_no" value="{{ entry.document_no }}" required></label><label>Date<input name="entry_date" type="date" value="{{ entry.entry_date }}" required></label><label>Reference<input name="reference" value="{{ entry.reference or '' }}"></label><label>Narration<input name="memo" value="{{ entry.memo or '' }}"></label></div><div class="line-head"><span>Ledger</span><span>Description</span><span>Debit</span><span>Credit</span><span>Currency</span><span>Rate</span><span></span></div><div id="lines">{% for line in lines %}<div class="line"><select name="account_id[]">{% for account in accounts %}<option value="{{ account.id }}" {% if account.id == line.account_id %}selected{% endif %}>{{ account.code }} - {{ account.name }}</option>{% endfor %}</select><input name="description[]" value="{{ line.description or '' }}"><input name="debit[]" type="number" step="0.01" min="0" value="{{ line.debit }}"><input name="credit[]" type="number" step="0.01" min="0" value="{{ line.credit }}"><input name="currency[]" value="{{ line.currency }}" maxlength="3" required><input name="fx_rate[]" type="number" step="0.000001" min="0.000001" value="{{ line.fx_rate }}" required><button class="remove" type="button">x</button></div>{% endfor %}</div><div class="actions"><a class="secondary" href="{{ url_for('transaction_detail', entry_id=entry.id) }}">Cancel</a><button class="primary">Save changes</button></div></form></section>{% endblock %}
