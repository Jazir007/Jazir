{% extends 'base.html' %}{% block heading %}Account subgroups{% endblock %}{% block content %}<section class="panel"><h2>Add subgroup</h2><form method="post" class="form-grid"><label>Main group<select name="category">{% for category in ['Asset','Liability','Equity','Income','Expense'] %}<option value="{{ category }}">{{ category }}</option>{% endfor %}</select></label><label>Subgroup name<input name="name" placeholder="e.g. Bank Accounts" required></label><button class="primary">Add subgroup</button></form></section><section class="panel"><table><thead><tr><th>Main group</th><th>Subgroup</th></tr></thead><tbody>{% for subgroup in subgroups %}<tr><td>{{ subgroup.category }}</td><td>{{ subgroup.name }}</td></tr>{% else %}<tr><td colspan="2" class="empty">No subgroups yet.</td></tr>{% endfor %}</tbody></table></section>{% endblock %}
